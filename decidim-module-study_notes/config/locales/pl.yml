          option_yes: Tak
          option_no: Nie
          section_5: 5. Adres do korespondencji składającego pismo
          section_5_description: Wypełnij tę część, jeśli Twój adres do korespondencji (lub adres do korespondencji osoby, w imieniu której składasz uwagę) jest inny, niż adres zamieszkania lub siedziby.
          section_6: 6. Dane pełnomocnika
          section_6_description: Wypełnij tę część, jeśli chcesz ustanowić pełnomocnika lub jeśli jesteś pełnomocnikiem i składasz uwagę w imieniu innej osoby.
          attorney_role_all: Pełnomocnik
          attorney_role_delivery: Pełnomocnik do doręczeń
          section_7: 7. Treść pisma
          detailed_notes_description: |
            W tej części wprowadzisz uwagi dla konkretnych lokalizacji. Jeśli chcesz złożyć uwagi <strong>wspólne</strong> dla jednej lub wielu lokalizacji (np. dla jednej działki, dla kilku działek, dla konkretnej strefy planistycznej), to wypełnij pola w części TEREN 1. Jeśli masz <strong>różne</strong> uwagi dla wielu lokalizacji, to po wypełnieniu części TEREN 1 dodaj kolejne tereny i wypełnij pola w każdym z nich. <br /><br /> Jeśli masz uwagi dotyczące tematu ogólnego, bez wskazywania konkretnych lokalizacji, to pomiń tę część i przejdź do sekcji 7b.
          detailed_notes_parcel_ids_description: |
            Możesz samodzielnie wpisać lokalizację (np. identyfikator działki lub działek ewidencyjnych, oznaczenie strefy planistycznej z projektu planu ogólnego) albo znaleźć i zaznaczyć działki ewidencyjne na mapie. Identyfikatory zatwierdzonych działek automatycznie wpiszą się w polu poniżej.
          add_item: DODAJ KOLEJNY TEREN, dla którego chcesz złożyć uwagę
