          section_4_description: |
            <ul>
              <li>Jeśli składasz uwagę we własnym imieniu – wypełnij tę część własnymi danymi.</li>
              <li>Jeśli składasz uwagę w imieniu innej osoby lub w imieniu instytucji – wypełnij tę część danymi tej osoby lub instytucji. </li>
              <li>Jeśli składasz uwagę w imieniu swoim i innych osób – wypełnij tę część swoimi danymi, a dane pozostałych osób załącz w osobnym pliku (załącznik dodasz w ostatniej części formularza).</li>
            </ul>
